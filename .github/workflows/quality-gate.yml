name: NeuroFlow Quality Gate

on:
  schedule:
    - cron: '0 2 * * *'  # Runs nightly at 2 AM

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Check retrieval benchmark
        run: |
          # Run retrieval eval against staging
          python evaluation/retrieval_eval.py --env staging || true
          # Fail if MRR drops below 0.55
          python -c "
          import json
          try:
              results = json.load(open('evaluation/retrieval_results.json'))
              mrr = results.get('mrr', 0)
              assert mrr >= 0.55, f'MRR {mrr} below threshold 0.55'
          except FileNotFoundError:
              print('Warning: evaluation/retrieval_results.json not found')
          "
      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text": "⚠️ NeuroFlow quality gate failed!"}'
