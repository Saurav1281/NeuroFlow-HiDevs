name: NeuroFlow CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Run Ruff
        run: ruff check backend/
      - name: Run Mypy
        run: mypy backend/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: neuroflow_test
      redis:
        image: redis:7-alpine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx motor aioredis python-jose[cryptography] passlib[bcrypt] bleach python-magic-bin
      - name: Run Unit Tests
        run: pytest tests/unit --cov=backend --cov-report=xml
        env:
          POSTGRES_USER: neuroflow
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: neuroflow_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: testsecret
          JWT_ALGORITHM: HS256
